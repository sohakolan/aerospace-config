# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ["layout tiles horizontal vertical"]  # corner layout

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
[gaps]
    inner.horizontal = 0
    inner.vertical = 0
    outer.left = 0
    outer.bottom = 0
    outer.top = 0
    outer.right = 0

# 'main' binding mode declaration
[mode.main.binding]

    ctrl-cmd-alt-enter = 'exec-and-forget open -n -a WezTerm'

    # Desactivate & Activate Tiling Mode
    ctrl-cmd-alt-space = "layout floating tiling"

    # Focus
    ctrl-cmd-alt-h = 'focus left'
    ctrl-cmd-alt-j = 'focus down'
    ctrl-cmd-alt-k = 'focus up'
    ctrl-cmd-alt-l = 'focus right'

    # Move
    shift-ctrl-cmd-alt-h = 'move left'
    shift-ctrl-cmd-alt-j = 'move down'
    shift-ctrl-cmd-alt-k = 'move up'
    shift-ctrl-cmd-alt-l = 'move right'

    # Resize
    ctrl-cmd-alt-equal = 'resize smart -50'
    ctrl-cmd-alt-slash = 'resize smart +50'

    # Workspaces
    ctrl-cmd-alt-1 = 'workspace 1'
    ctrl-cmd-alt-2 = 'workspace 2'
    ctrl-cmd-alt-3 = 'workspace 3'
    ctrl-cmd-alt-4 = 'workspace 4'
    ctrl-cmd-alt-5 = 'workspace 5'
    ctrl-cmd-alt-6 = 'workspace 6'
    ctrl-cmd-alt-7 = 'workspace 7'
    ctrl-cmd-alt-8 = 'workspace 8'
    ctrl-cmd-alt-9 = 'workspace 9'

    # Move node to workspace
    shift-ctrl-cmd-alt-1 = 'move-node-to-workspace 1'
    shift-ctrl-cmd-alt-2 = 'move-node-to-workspace 2'
    shift-ctrl-cmd-alt-3 = 'move-node-to-workspace 3'
    shift-ctrl-cmd-alt-4 = 'move-node-to-workspace 4'
    shift-ctrl-cmd-alt-5 = 'move-node-to-workspace 5'
    shift-ctrl-cmd-alt-6 = 'move-node-to-workspace 6'
    shift-ctrl-cmd-alt-7 = 'move-node-to-workspace 7'
    shift-ctrl-cmd-alt-8 = 'move-node-to-workspace 8'
    shift-ctrl-cmd-alt-9 = 'move-node-to-workspace 9'

    # Workspaces écran 2
    ctrl-cmd-alt-q = 'workspace 10'
    ctrl-cmd-alt-w = 'workspace 11'
    ctrl-cmd-alt-e = 'workspace 12'
    ctrl-cmd-alt-r = 'workspace 13'
    ctrl-cmd-alt-t = 'workspace 14'
    ctrl-cmd-alt-y = 'workspace 15'
    ctrl-cmd-alt-u = 'workspace 16'
    ctrl-cmd-alt-i = 'workspace 17'
    ctrl-cmd-alt-o = 'workspace 18'
    ctrl-cmd-alt-p = 'workspace 19'


    # Move node to workspace
    shift-ctrl-cmd-alt-q = 'move-node-to-workspace 10'
    shift-ctrl-cmd-alt-w = 'move-node-to-workspace 11'
    shift-ctrl-cmd-alt-e = 'move-node-to-workspace 12'
    shift-ctrl-cmd-alt-r = 'move-node-to-workspace 13'
    shift-ctrl-cmd-alt-t = 'move-node-to-workspace 14'
    shift-ctrl-cmd-alt-y = 'move-node-to-workspace 15'
    shift-ctrl-cmd-alt-u = 'move-node-to-workspace 16'
    shift-ctrl-cmd-alt-i = 'move-node-to-workspace 17'
    shift-ctrl-cmd-alt-o = 'move-node-to-workspace 18'
    shift-ctrl-cmd-alt-p = 'move-node-to-workspace 19'


   [workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = 'main'
    7 = 'main'
    8 = 'main'
    9 = 'main'
    10 = 'secondary'
    11 = 'secondary'
    12 = 'secondary'
    13 = 'secondary'
    14 = 'secondary'
    15 = 'secondary'
    16 = 'secondary'
    17 = 'secondary'
    18 = 'secondary'
    19 = 'secondary'


    # Workspace back and forth
    ctrl-cmd-alt-tab = 'workspace-back-and-forth'
    # ctrl-cmd-alt-tab = 'move-workspace-to-monitor --wrap-around next'

    # Mode
    shift-ctrl-cmd-semicolon = 'mode service'

    # Corner layout bindings (3rd window bottom-right)
    ctrl-cmd-alt-b = "join-with down"   # place la fenêtre en bas
    ctrl-cmd-alt-n = "join-with right"  # place la fenêtre à droite

# 'service' binding mode declaration.
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    shift-ctrl-cmd-h = ['join-with left', 'mode main']
    shift-ctrl-cmd-j = ['join-with down', 'mode main']
    shift-ctrl-cmd-k = ['join-with up', 'mode main']
    shift-ctrl-cmd-l = ['join-with right', 'mode main']
